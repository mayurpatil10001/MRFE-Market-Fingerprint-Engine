version: "3.9"

services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    environment:
      DATABASE_URL: postgresql+asyncpg://mrfe:mrfe@postgres:5432/mrfe
      REDIS_URL: redis://redis:6379/0
      MONGO_URL: mongodb://mongo:27017
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY:-dev-private-key}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY:-dev-public-key}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
      - mongo

  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.worker
    environment:
      DATABASE_URL: postgresql+asyncpg://mrfe:mrfe@postgres:5432/mrfe
      REDIS_URL: redis://redis:6379/0
      MONGO_URL: mongodb://mongo:27017
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
    depends_on:
      - postgres
      - redis
      - mongo

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    ports:
      - "5173:80"
    depends_on:
      - api

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mrfe
      POSTGRES_PASSWORD: mrfe
      POSTGRES_DB: mrfe
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mrfe"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.runCommand({ ping: 1 })"]
      interval: 15s
      timeout: 10s
      retries: 5

  redis:
    image: redis:7.2-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  mongo_data:
