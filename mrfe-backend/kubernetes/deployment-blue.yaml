apiVersion: apps/v1
kind: Deployment
metadata:
  name: mrfe-api-blue
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mrfe-api
      color: blue
  template:
    metadata:
      labels:
        app: mrfe-api
        color: blue
    spec:
      containers:
        - name: api
          image: ghcr.io/example/mrfe-backend:blue
          ports:
            - containerPort: 8000
