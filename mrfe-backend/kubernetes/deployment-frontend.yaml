apiVersion: apps/v1
kind: Deployment
metadata:
  name: mrfe-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mrfe-frontend
  template:
    metadata:
      labels:
        app: mrfe-frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/example/mrfe-frontend:latest
          ports:
            - containerPort: 80
