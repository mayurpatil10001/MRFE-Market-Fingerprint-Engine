replicaCount: 3

image:
  repository: ghcr.io/example/mrfe-backend
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 8000

env:
  environment: production
  databaseUrl: postgresql+asyncpg://mrfe:mrfe@postgres:5432/mrfe
  redisUrl: redis://redis:6379/0

secrets:
  jwtPrivateKey: replace-with-private-key
  jwtPublicKey: replace-with-public-key

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 1Gi

ingress:
  enabled: true
  host: mrfe.local
