name: deploy

on:
  push:
    branches: ["develop", "main"]
  release:
    types: [published]

jobs:
  deploy-dev:
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - name: Validate required secrets
        run: |
          test -n "${{ secrets.OPENROUTER_API_KEY }}"
          test -n "${{ secrets.JWT_PRIVATE_KEY }}"
          test -n "${{ secrets.JWT_PUBLIC_KEY }}"
          test -n "${{ secrets.KUBE_CONFIG_DEV }}"
      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_DEV }}" | base64 -d > ~/.kube/config
      - name: Deploy to dev
        run: |
          helm upgrade --install mrfe-dev ./helm/mrfe \
            --set image.tag=${GITHUB_SHA} \
            --set env.OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }} \
            --set env.JWT_PRIVATE_KEY=${{ secrets.JWT_PRIVATE_KEY }} \
            --set env.JWT_PUBLIC_KEY=${{ secrets.JWT_PUBLIC_KEY }} \
            --namespace mrfe --create-namespace
      - name: Smoke test
        run: curl -fsS https://dev.mrfe.local/api/v1/health/ready

  deploy-staging:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - name: Validate required secrets
        run: |
          test -n "${{ secrets.OPENROUTER_API_KEY }}"
          test -n "${{ secrets.JWT_PRIVATE_KEY }}"
          test -n "${{ secrets.JWT_PUBLIC_KEY }}"
          test -n "${{ secrets.KUBE_CONFIG_STAGING }}"
      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_STAGING }}" | base64 -d > ~/.kube/config
      - name: Deploy to staging
        run: |
          helm upgrade --install mrfe-staging ./helm/mrfe \
            --set image.tag=${GITHUB_SHA} \
            --set env.OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }} \
            --set env.JWT_PRIVATE_KEY=${{ secrets.JWT_PRIVATE_KEY }} \
            --set env.JWT_PUBLIC_KEY=${{ secrets.JWT_PUBLIC_KEY }} \
            --namespace mrfe --create-namespace
      - name: Run DB migrations
        run: alembic upgrade head
      - name: Smoke test
        run: curl -fsS https://staging.mrfe.local/api/v1/health/ready

  deploy-prod:
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - name: Validate required secrets
        run: |
          test -n "${{ secrets.OPENROUTER_API_KEY }}"
          test -n "${{ secrets.JWT_PRIVATE_KEY }}"
          test -n "${{ secrets.JWT_PUBLIC_KEY }}"
          test -n "${{ secrets.KUBE_CONFIG_PROD }}"
      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_PROD }}" | base64 -d > ~/.kube/config
      - name: Deploy to production
        run: |
          helm upgrade --install mrfe-prod ./helm/mrfe \
            --set image.tag=${GITHUB_SHA} \
            --set env.OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }} \
            --set env.JWT_PRIVATE_KEY=${{ secrets.JWT_PRIVATE_KEY }} \
            --set env.JWT_PUBLIC_KEY=${{ secrets.JWT_PUBLIC_KEY }} \
            --namespace mrfe --create-namespace
      - name: Post-deploy smoke test
        run: curl -fsS https://mrfe.local/api/v1/health/ready
      - name: Rollback command hint
        run: helm rollback mrfe-prod 1 --namespace mrfe
