name: ci

on:
  push:
    branches: ["main", "develop"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: mrfe
          POSTGRES_PASSWORD: mrfe
          POSTGRES_DB: mrfe
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mrfe"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
    env:
      DATABASE_URL: postgresql+asyncpg://mrfe:mrfe@localhost:5432/mrfe
      REDIS_URL: redis://localhost:6379/0
      JWT_PRIVATE_KEY: test-private-key
      JWT_PUBLIC_KEY: test-public-key
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio ruff mypy hypothesis
      - name: Install frontend deps
        working-directory: frontend
        run: npm ci
      - name: Lint
        run: ruff check src tests
      - name: Type check
        run: mypy src --config-file mypy.ini
      - name: Test
        run: pytest
      - name: Frontend lint
        working-directory: frontend
        run: npm run lint
      - name: Frontend test
        working-directory: frontend
        run: npm run test
      - name: Frontend build
        working-directory: frontend
        run: npm run build

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install security tooling
        run: |
          python -m pip install --upgrade pip
          pip install bandit pip-audit
      - name: Bandit scan
        run: bandit -q -r src -x tests
      - name: Dependency audit
        run: pip-audit -r requirements.txt

  docker:
    runs-on: ubuntu-latest
    needs: [test, security]
    steps:
      - uses: actions/checkout@v4
      - name: Validate required deployment env names
        run: |
          test -n "${{ vars.OPENROUTER_BASE_URL || 'https://openrouter.ai/api/v1' }}"
          echo "OPENROUTER env namespace looks configured"
      - name: Build API image
        run: docker build -f docker/Dockerfile.api -t mrfe-api:ci .
      - name: Build Worker image
        run: docker build -f docker/Dockerfile.worker -t mrfe-worker:ci .
      - name: Build Frontend image
        run: docker build -f docker/Dockerfile.frontend -t mrfe-frontend:ci .
